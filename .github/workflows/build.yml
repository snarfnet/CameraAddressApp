name: Build and Upload to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode 26
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 10 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" "s/CURRENT_PROJECT_VERSION: [0-9]*/CURRENT_PROJECT_VERSION: $BUILD_NUM/" project.yml
        echo "Build number: $BUILD_NUM"
        grep CURRENT_PROJECT_VERSION project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Take Simulator Screenshots
      run: |
        set -e
        echo "=== Building for simulator ==="
        xcodebuild build \
          -scheme CameraAddressApp \
          -configuration Debug \
          -destination "platform=iOS Simulator,name=iPhone 15 Plus" \
          -derivedDataPath build/sim \
          CODE_SIGNING_ALLOWED=NO \
          2>&1 | grep -E "error:|Build succeeded|Build FAILED" | tail -20

        APP_PATH=$(find build/sim -name "CameraAddressApp.app" -not -path "*/PlugIns/*" | head -1)
        echo "App: $APP_PATH"
        mkdir -p screenshots

        take_screenshots() {
          local DEVICE_NAME="$1"
          local PREFIX="$2"
          local SIM_ID=$(xcrun simctl list devices available | grep "\"${DEVICE_NAME}\"" | grep -oE '[A-F0-9-]{36}' | head -1)
          if [ -z "$SIM_ID" ]; then
            echo "No simulator for $DEVICE_NAME, skipping"
            return
          fi
          echo "--- $DEVICE_NAME ($SIM_ID) ---"
          xcrun simctl boot "$SIM_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$SIM_ID" -b
          xcrun simctl privacy "$SIM_ID" grant camera com.tokyonasu.CameraAddressApp 2>/dev/null || true
          xcrun simctl privacy "$SIM_ID" grant location-always com.tokyonasu.CameraAddressApp 2>/dev/null || true
          xcrun simctl install "$SIM_ID" "$APP_PATH"
          xcrun simctl launch "$SIM_ID" com.tokyonasu.CameraAddressApp
          sleep 7
          xcrun simctl io "$SIM_ID" screenshot "screenshots/${PREFIX}_1.png"
          sleep 3
          xcrun simctl io "$SIM_ID" screenshot "screenshots/${PREFIX}_2.png"
          sleep 3
          xcrun simctl io "$SIM_ID" screenshot "screenshots/${PREFIX}_3.png"
          xcrun simctl terminate "$SIM_ID" com.tokyonasu.CameraAddressApp 2>/dev/null || true
          xcrun simctl shutdown "$SIM_ID" || true
          echo "Screenshots for $DEVICE_NAME done"
        }

        take_screenshots "iPhone 15 Plus" "screen_67"
        take_screenshots "iPhone 11 Pro Max" "screen_65"

        echo "=== Screenshots taken ==="
        ls -la screenshots/

    - name: Import Distribution Certificate
      env:
        CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
        CERT_PASSWORD: ${{ secrets.DIST_CERT_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      run: |
        security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        security set-keychain-settings -t 3600 -u build.keychain
        echo "$CERT_BASE64" | base64 -D > cert.p12
        security import cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
        rm cert.p12

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
        cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

    - name: Build Archive
      run: |
        xcodebuild archive \
          -scheme CameraAddressApp \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/CameraAddressApp.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
          -archivePath build/CameraAddressApp.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist export_options.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec
        ls -la build/export/*.ipa

    - name: Upload IPA via altool
      run: |
        xcrun altool --upload-app \
          -f build/export/CameraAddressApp.ipa \
          -t ios \
          --apiKey WDXGY9WX55 \
          --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec \
          --verbose 2>&1 || true

    - name: Install PyJWT
      run: pip3 install --break-system-packages PyJWT requests

    - name: Prepare Version (create version + assign build)
      run: python3 scripts/submit.py ${{ env.BUILD_NUM }} --prepare-only

    - name: Upload Screenshots to ASC
      run: python3 scripts/upload_screenshots.py

    - name: Submit for Review
      run: python3 scripts/submit.py ${{ env.BUILD_NUM }}
