name: Take Screenshots and Upload

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode
      run: |
        XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
        sudo xcode-select -s "/Applications/$XCODE_APP"
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Find available simulators
      run: |
        echo "=== Available iPhone simulators ==="
        xcrun simctl list devices available | grep -i "iphone"
        # Pick 6.1-inch and 6.7-inch devices
        SIM61=$(xcrun simctl list devices available | grep -oE "iPhone (16 Pro|15 Pro|16) " | head -1 | xargs)
        SIM67=$(xcrun simctl list devices available | grep -oE "iPhone (16 Pro Max|15 Pro Max|16 Plus)" | head -1 | xargs)
        if [ -z "$SIM61" ]; then SIM61=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/^[[:space:]]*//' | cut -d'(' -f1 | xargs); fi
        if [ -z "$SIM67" ]; then SIM67="$SIM61"; fi
        echo "SIM61=$SIM61" >> $GITHUB_ENV
        echo "SIM67=$SIM67" >> $GITHUB_ENV
        echo "Using 6.1-inch: $SIM61"
        echo "Using 6.7-inch: $SIM67"

    - name: Build for Simulator
      run: |
        xcodebuild build \
          -scheme CameraAddressApp \
          -configuration Debug \
          -destination "platform=iOS Simulator,name=$SIM61" \
          -derivedDataPath build/derived \
          CODE_SIGNING_ALLOWED=NO

    - name: Take 6.1-inch screenshots
      run: |
        xcrun simctl boot "$SIM61" || true
        sleep 3
        xcrun simctl ui "$SIM61" appearance light
        xcrun simctl install "$SIM61" build/derived/Build/Products/Debug-iphonesimulator/CameraAddressApp.app
        xcrun simctl launch "$SIM61" com.tokyonasu.CameraAddressApp -SCREENSHOT_MODE
        sleep 6
        xcrun simctl io "$SIM61" screenshot screenshots/iphone61_ja_1.png
        sleep 2
        xcrun simctl io "$SIM61" screenshot screenshots/iphone61_ja_2.png
        xcrun simctl io "$SIM61" screenshot screenshots/iphone61_ja_3.png
        xcrun simctl shutdown "$SIM61"

    - name: Take 6.7-inch screenshots
      run: |
        xcrun simctl boot "$SIM67" || true
        sleep 3
        xcrun simctl ui "$SIM67" appearance light
        xcrun simctl install "$SIM67" build/derived/Build/Products/Debug-iphonesimulator/CameraAddressApp.app
        xcrun simctl launch "$SIM67" com.tokyonasu.CameraAddressApp -SCREENSHOT_MODE
        sleep 6
        xcrun simctl io "$SIM67" screenshot screenshots/iphone67_ja_1.png
        sleep 2
        xcrun simctl io "$SIM67" screenshot screenshots/iphone67_ja_2.png
        xcrun simctl io "$SIM67" screenshot screenshots/iphone67_ja_3.png
        xcrun simctl shutdown "$SIM67"

    - name: Copy screenshots for EN locale
      run: |
        cp screenshots/iphone61_ja_1.png screenshots/iphone61_en_1.png
        cp screenshots/iphone61_ja_2.png screenshots/iphone61_en_2.png
        cp screenshots/iphone61_ja_3.png screenshots/iphone61_en_3.png
        cp screenshots/iphone67_ja_1.png screenshots/iphone67_en_1.png
        cp screenshots/iphone67_ja_2.png screenshots/iphone67_en_2.png
        cp screenshots/iphone67_ja_3.png screenshots/iphone67_en_3.png

    - name: Install PyJWT
      run: pip3 install --break-system-packages PyJWT requests

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.ASC_API_KEY_CONTENT }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > /tmp/asc_key.p8

    - name: Upload screenshots to ASC
      run: python3 upload_screenshots.py
      env:
        ASC_KEY_PATH: /tmp/asc_key.p8
