name: CameraAddressApp
packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 11.0.0
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "16.0"
  defaultConfig: Release

configs:
  Debug: debug
  Release: release

targets:
  CameraAddressApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: CameraAddressApp
        excludes:
          - Info.plist
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.CameraAddressApp
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 83VGKGSQUH
        CODE_SIGN_STYLE: Automatic
    info:
      path: CameraAddressApp/Info.plist
      properties:
        CFBundleName: CameraAddress
        CFBundleDisplayName: CameraAddress
        CFBundleIconName: AppIcon
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "カメラで撮影した写真に住所を重ねて保存します"
        NSLocationWhenInUseUsageDescription: "現在地の住所を表示するために位置情報を使用します"
        NSPhotoLibraryAddUsageDescription: "住所入り写真をフォトライブラリに保存します"
        NSUserTrackingUsageDescription: "パーソナライズ広告のためにデータを使用します"
        GADApplicationIdentifier: "ca-app-pub-9404799280370656~5231085492"
